---
applications:
- name: ws-authz
  memory: 1G
  buildpack: java_buildpack_offline
  path: authz/target/authz-0.0.1-SNAPSHOT.jar
  services:
    - ws-authz-db
  env:
    SERVER_PORT: 8080
    SPRING_SECURITY_OAUTH2_AUTHORIZATIONSERVER_CLIENT_SPRING_REGISTRATION_REDIRECT_URIS_0: https://ws-client.apps.tas-ndc.kuhn-labs.com/login/oauth2/code/spring
    SPRING_AI_MCP_AUTHORIZATIONSERVER_DYNAMIC_CLIENT_REGISTRATION_ENABLED: "false"

- name: ws-service
  memory: 1G
  buildpack: java_buildpack_offline
  path: service/target/service-0.0.1-SNAPSHOT.jar
  env:
    SERVER_PORT: 8080
    SPRING_APPLICATION_NAME: service
    SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: https://ws-authz.apps.tas-ndc.kuhn-labs.com
    SPRING_AI_MCP_SERVER_PROTOCOL: streamable

- name: ws-client
  memory: 1G
  instances: 1
  buildpack: java_buildpack_offline
  path: client/target/client-0.0.1-SNAPSHOT.jar
  health-check-type: process
  services:
    - genai-service
  env:
    SERVER_PORT: 8080
    SPRING_APPLICATION_NAME: client
    SPRING_AI_MCP_CLIENT_INITIALIZED: "false"
    SPRING_AI_MCP_CLIENT_STREAMABLE_HTTP_CONNECTIONS_SCHEDULER_URL: https://ws-service.apps.tas-ndc.kuhn-labs.com
    SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_SPRING_ISSUER_URI: https://ws-authz.apps.tas-ndc.kuhn-labs.com
    SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SPRING_PROVIDER: spring
    SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SPRING_CLIENT_ID: spring
    SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SPRING_CLIENT_SECRET: spring
    SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SPRING_AUTHORIZATION_GRANT_TYPE: authorization_code
    SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SPRING_CLIENT_AUTHENTICATION_METHOD: client_secret_basic
    SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SPRING_REDIRECT_URI: https://ws-client.apps.tas-ndc.kuhn-labs.com/login/oauth2/code/spring
